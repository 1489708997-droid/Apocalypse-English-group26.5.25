<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业帮刷单词</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls-top { margin-bottom: 20px; }
        .card-container { width: 85vw; height: 300px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 30px; display: flex; gap: 20px; }
        button { padding: 15px 30px; border: none; border-radius: 30px; background: var(--primary); color: white; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="controls-top">
    <select id="dateFilter" onchange="initGame()" style="padding:8px; border-radius:5px;">
        <option value="all">混合模式</option>
        <option value="05/25">05/25</option>
        <option value="05/26">05/26</option>
        <option value="05/27">05/27</option>
        <option value="05/28">05/28</option>
        <option value="05/29">05/29</option>
        <option value="05/30">05/30</option>
    </select>
</div>

<div class="card-container" onclick="flipCard()">
    <div class="card" id="card">
        <div class="face front"><h1 id="en">点击开始</h1></div>
        <div class="face back"><h2 id="cn"></h2><p id="ipa"></p></div>
    </div>
</div>

<div class="btn-group">
    <button onclick="mark('fuzzy')" style="background:#e67e22">模糊</button>
    <button onclick="mark('known')" style="background:#50c878">认识</button>
</div>

<script>
    const wordList = [
        {date:"05/30", word:"accelerate", cn:"加速", ipa:"/ækˈsɛləˌreɪt/"},
        {date:"05/30", word:"apparent", cn:"明显", ipa:"/əˈpɛrənt/"},
        // ... (其余单词列表请保持完整)
    ];

    let currentQueue = [];
    let fuzzyQueue = [];
    let currentIndex = 0;

    // 发音函数
    function speak(text) {
        window.speechSynthesis.cancel(); // 先停止之前的语音
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // 语速适中
        window.speechSynthesis.speak(utterance);
    }

    function initGame() {
        const filter = document.getElementById('dateFilter').value;
        currentQueue = filter === 'all' ? [...wordList] : wordList.filter(w => w.date === filter);
        fuzzyQueue = [];
        currentIndex = 0;
        showCard();
    }

    function showCard() {
        if (currentIndex >= currentQueue.length) {
            if (fuzzyQueue.length > 0) {
                currentQueue = [...fuzzyQueue];
                fuzzyQueue = [];
                currentIndex = 0;
                alert("本轮结束，准备复习模糊的单词！");
                showCard();
            } else {
                alert("太棒了！今日份刷单词已全部完成。");
                initGame();
            }
            return;
        }
        const w = currentQueue[currentIndex];
        document.getElementById('en').innerText = w.word;
        document.getElementById('cn').innerText = w.cn;
        document.getElementById('ipa').innerText = w.ipa;
        
        // 显示卡片时自动播放
        speak(w.word);
    }

    function mark(type) {
        if (type === 'fuzzy') fuzzyQueue.push(currentQueue[currentIndex]);
        document.getElementById('card').classList.remove('flipped');
        setTimeout(() => {
            currentIndex++;
            showCard();
        }, 300);
    }

    function flipCard() { 
        document.getElementById('card').classList.toggle('flipped'); 
        // 翻面时也可以选配是否再读一次
        if (document.getElementById('card').classList.contains('flipped')) {
            speak(currentQueue[currentIndex].word);
        }
    }
    
    initGame();
</script>
</body>
</html>
