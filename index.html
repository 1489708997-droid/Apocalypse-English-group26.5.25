    <style>

        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; box-sizing: border-box; }
        .controls-top { margin-bottom: 10px; }
        .card-container { width: 85vw; height: 300px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        button { padding: 15px 25px; border: none; border-radius: 30px; background: var(--primary); color: white; cursor: pointer; font-size: 16px; }
        .speaker-btn { background: #607d8b; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; }
        .word-en { font-size: 1.4rem; font-weight: bold; text-align: center; }
        .word-cn { font-size: 1.3rem; color: #666; margin-bottom: 10px; }
        .ipa { color: #888; font-size: 1rem; }
    </style>
</head>

    ];

    // 以下逻辑保持不变
    let currentQueue = [];
    let fuzzyQueue = [];

    function playAudio() {
        if(currentQueue.length > 0) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQueue[0].word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    }

    function initGame() {
        const filter = document.getElementById('dateFilter').value;
        currentQueue = filter === 'all' ? [...wordList] : wordList.filter(w => w.date === filter);
        fuzzyQueue = [];
        showCard();
    }

    function showCard() {
        if (currentQueue.length === 0) {
            if (fuzzyQueue.length > 0) {
                currentQueue = [...fuzzyQueue];
                fuzzyQueue = [];
                showCard();
            } else {
                alert("太棒了！已全部刷完。");
                initGame();
            }
            return;
        }
        const w = currentQueue[0];
        document.getElementById('en').innerText = w.word;
        document.getElementById('cn').innerText = w.cn;
        document.getElementById('ipa').innerText = w.ipa;
    }

    function handleCardClick() {
        document.getElementById('card').classList.toggle('flipped');
        playAudio(); 
    }

    function mark(type) {
        const word = currentQueue.shift();
        if (type === 'fuzzy') fuzzyQueue.push(word);
        document.getElementById('card').classList.remove('flipped');
        setTimeout(showCard, 300);
    }
    
    initGame();
</script>
