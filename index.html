<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日单词/句子打卡</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .card-container { width: 90vw; max-width: 500px; height: 300px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        button { padding: 12px 20px; border: none; border-radius: 30px; background: var(--primary); color: white; cursor: pointer; }
        .word-en { font-size: 1.3rem; font-weight: bold; text-align: center; }
        .word-cn { font-size: 1.2rem; color: #666; margin-bottom: 10px; }
        .ipa { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="initGame()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="initGame()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card-container" onclick="handleCardClick()">
    <div class="card" id="card">
        <div class="face front"><h1 id="en" class="word-en">点击开始</h1></div>
        <div class="face back">
            <div id="cn" class="word-cn"></div>
            <div id="ipa" class="ipa"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button onclick="mark('fuzzy')" style="background:#e67e22">模糊</button>
    <button onclick="playAudio()" style="background:#607d8b">🔊</button>
    <button onclick="mark('known')" style="background:#50c878">认识</button>
</div>

<script>
    const wordList = [
        // 05/25 - 06/09 历史数据 (已手动补充 Type)
        {date:"05/25", type:'word', word:"advantage", cn:"优势", ipa:"/ədˈvæntɪdʒ/"},{date:"05/26", type:'word', word:"admit", cn:"承认", ipa:"/ədˈmɪt/"},{date:"05/27", type:'word', word:"sunshine", cn:"阳光", ipa:"/ˈsʌnˌʃaɪn/"},{date:"05/28", type:'word', word:"challenge", cn:"挑战", ipa:"/ˈtʃæləndʒ/"},{date:"05/29", type:'word', word:"bargain", cn:"讲价", ipa:"/ˈbɑrɡɪn/"},{date:"05/30", type:'word', word:"accelerate", cn:"加速", ipa:"/ækˈsɛləˌreɪt/"},{date:"05/31", type:'sentence', word:"Every effort pays off.", cn:"努力终有回报。", ipa:"/ˈɛvri ˈɛfərt peɪz ɔf/"},{date:"06/01", type:'sentence', word:"Practice makes perfect.", cn:"熟能生巧。", ipa:"/ˈpræktɪs meɪks ˈpɜrfɪkt/"},{date:"06/02", type:'sentence', word:"Life is full of small surprises.", cn:"生活处处有小惊喜。", ipa:"/laɪf ɪz fʊl əv smɔl sərˈpraɪzəz/"},{date:"06/03", type:'sentence', word:"What matters most is sticking to daily reading.", cn:"最重要的是坚持每日阅读。", ipa:"/wʌt ˈmætərz moʊst ɪz ˈstɪkɪŋ tu ˈdeɪli ˈridɪŋ/"},{date:"06/04", type:'sentence', word:"I'm running a little late.", cn:"我稍微晚点到。", ipa:"/aɪm ˈrʌnɪŋ ə ˈlɪtəl leɪt/"},{date:"06/05", type:'sentence', word:"Good manners leave a deep impression on others.", cn:"良好的修养会给人留下深刻印象。", ipa:"/ɡʊd ˈmænərz liv ə dip ɪmˈprɛʃən ɑn ˈʌðərz/"},{date:"06/06", type:'sentence', word:"Self-discipline lays the foundation for dreams.", cn:"自律为梦想打下根基。", ipa:"/ˌsɛlf ˈdɪsəplɪn leɪz ðə faʊnˈdeɪʃən fɔr drimz/"},{date:"06/07", type:'word', word:"plenty", cn:"大量", ipa:"/ˈplɛnti/"},{date:"06/08", type:'sentence', word:"Teamwork plays an important role in college life.", cn:"团队协作在大学生活中十分重要。", ipa:"/ˈtimˌwɜrk pleɪz ən ɪmˈpɔrtənt roʊl ɪn ˈkɑlɪdʒ laɪf/"},{date:"06/09", type:'sentence', word:"Knowledge is power.", cn:"知识就是力量。", ipa:"/ˈnɑlɪdʒ ɪz ˈpaʊər/"},
        // 06/10 - 06/17 最新内容
        {date:"06/10", type:'sentence', word:"Only by striving constantly can we embrace a promising future.", cn:"唯有不懈奋斗，方能拥抱美好未来。", ipa:"/ˈoʊnli baɪ ˈstraɪvɪŋ ˈkɑnstəntli kæn wi ɛmˈbreɪs ə ˈprɑmɪsɪŋ ˈfjutʃər/"},{date:"06/11", type:'sentence', word:"It’s up to you.", cn:"由你决定。", ipa:"/ɪts ʌp tu ju/"},{date:"06/12", type:'sentence', word:"I’m considering whether to take a gap year before going to college.", cn:"我在考虑上大学前是否要休学一年。", ipa:"/aɪm kənˈsɪdərɪŋ ˈwɛðər tu teɪk ə ɡæp jɪr/"},{date:"06/13", type:'word', word:"persistent", cn:"坚持不懈的", ipa:"/pərˈsɪstənt/"},{date:"06/14", type:'word', word:"dilemma", cn:"两难选择", ipa:"/dɪˈlɛmə/"},{date:"06/15", type:'sentence', word:"Faced with this tough dilemma, he chose to restrain his impulse.", cn:"面对两难困境，他选择克制自身冲动。", ipa:"/feɪst wɪð ðɪs tʌf dɪˈlɛmə/"},{date:"06/16", type:'word', word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪˌkeɪtɪd/"},{date:"06/17", type:'sentence', word:"Cherish every ordinary day.", cn:"珍惜每一个平凡日子。", ipa:"/ˈtʃɛrɪʃ ˈɛvri ˈɔrdəˌnɛri deɪ/"}
    ];

    let currentQueue = [];

    function initDateDropdown() {
        const select = document.getElementById('dateFilter');
        const dates = [...new Set(wordList.map(item => item.date))].sort();
        dates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.innerText = d;
            select.appendChild(opt);
        });
    }

    function initGame() {
        const mode = document.getElementById('modeFilter').value;
        const date = document.getElementById('dateFilter').value;
        currentQueue = wordList.filter(item => {
            const matchMode = (mode === 'all') || (item.type === mode);
            const matchDate = (date === 'all') || (item.date === date);
            return matchMode && matchDate;
        });
        showCard();
    }

    function showCard() {
        const el = document.getElementById('en');
        if (currentQueue.length === 0) {
            el.innerText = "该条件下无内容";
            document.getElementById('cn').innerText = "";
            document.getElementById('ipa').innerText = "";
        } else {
            const w = currentQueue[0];
            el.innerText = w.word;
            document.getElementById('cn').innerText = w.cn;
            document.getElementById('ipa').innerText = w.ipa;
        }
    }

    function handleCardClick() { document.getElementById('card').classList.toggle('flipped'); }
    function playAudio() { if(currentQueue.length>0) { const u = new SpeechSynthesisUtterance(currentQueue[0].word); u.lang='en-US'; window.speechSynthesis.speak(u); } }
    function mark() { currentQueue.shift(); document.getElementById('card').classList.remove('flipped'); showCard(); }

    initDateDropdown();
    initGame();
</script>
</body>
</html>
