<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日单词打卡</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; box-sizing: border-box; }
        .controls-top { margin-bottom: 10px; }
        .card-container { width: 85vw; height: 300px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        button { padding: 15px 25px; border: none; border-radius: 30px; background: var(--primary); color: white; cursor: pointer; font-size: 16px; }
        .speaker-btn { background: #607d8b; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; }
        .word-en { font-size: 1.4rem; font-weight: bold; text-align: center; }
        .word-cn { font-size: 1.3rem; color: #666; margin-bottom: 10px; }
        .ipa { color: #888; font-size: 1rem; }
    </style>
</head>
<body>

<div class="controls-top">
    <select id="dateFilter" onchange="initGame()" style="padding:8px; border-radius:5px; font-size: 16px;">
        <option value="all">混合模式</option>
        <option value="06/10">06/10</option>
        <option value="06/11">06/11</option>
        <option value="06/12">06/12</option>
        <option value="06/13">06/13</option>
        <option value="06/14">06/14</option>
        <option value="06/15">06/15</option>
        <option value="06/16">06/16</option>
        <option value="06/17">06/17</option>
    </select>
</div>

<div class="card-container" onclick="handleCardClick()">
    <div class="card" id="card">
        <div class="face front"><h1 id="en" class="word-en">点击开始</h1></div>
        <div class="face back">
            <div id="cn" class="word-cn"></div>
            <div id="ipa" class="ipa"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button onclick="mark('fuzzy')" style="background:#e67e22">模糊</button>
    <button class="speaker-btn" onclick="playAudio()">🔊</button>
    <button onclick="mark('known')" style="background:#50c878">认识</button>
</div>

<script>
    const wordList = [
        {date:"06/10", word:"Only by striving constantly can we embrace a promising future and realize our life values.", cn:"唯有不懈奋斗，方能拥抱美好未来，实现人生价值。", ipa:"/ˈoʊnli baɪ ˈstraɪvɪŋ ˈkɑnstəntli kæn wi ɛmˈbreɪs ə ˈprɑmɪsɪŋ ˈfjutʃər ænd ˈriəˌlaɪz ˈaʊər laɪf ˈvæljuːz/"},
        {date:"06/10", word:"Those who dare to challenge difficulties are more likely to gain extraordinary achievements in the long run.", cn:"敢于直面困境的人，终有机会收获不凡的成就。", ipa:"/ðoʊz hu dɛr tu ˈtʃæləndʒ ˈdɪfɪkəltiz ɑr mɔr ˈlaɪkli tu ɡeɪn ɪkˈstrɔrdəˌnɛri əˈtʃivmənts ɪn ðə lɔŋ rʌn/"},
        {date:"06/10", word:"What really matters is not where you start, but how firmly you stick to your original dream.", cn:"真正重要的不是起点，而是坚守初心的决心。", ipa:"/wʌt ˈrɪli ˈmætərz ɪz nɑt wɛr ju stɑrt, bʌt haʊ ˈfɜrmli ju stɪk tu jʊər əˈrɪdʒənəl drim/"},
        {date:"06/10", word:"Adversity tends to shape strong wills and make people grow faster than ease and comfort.", cn:"逆境磨砺意志，远比安逸更能催人成长。", ipa:"/ədˈvɜrsəti tɛndz tu ʃeɪp strɔŋ wɪlz ænd meɪk ˈpipəl ɡroʊ ˈfæstər ðæn iz ænd ˈkʌmfərt/"},
        {date:"06/10", word:"We should learn to reflect on ourselves so as to avoid repeating past mistakes and make steady progress.", cn:"我们应学会自省，规避过往失误，稳步前行。", ipa:"/wi ʃʊd lɜrn tu rɪˈflɛkt ɑn ˈaʊərˌsɛlvz soʊ æz tu əˈvɔɪd rɪˈpitɪŋ pæst mɪˈsteɪks ænd meɪk ˈstɛdi ˈprɑɡrəs/"},
        {date:"06/11", word:"Could you give me a hand?", cn:"能帮我一下吗？", ipa:"/kʊd ju ɡɪv mi ə hænd/"},
        {date:"06/11", word:"It’s up to you.", cn:"由你决定。", ipa:"/ɪts ʌp tu ju/"},
        {date:"06/11", word:"Take your time.", cn:"别着急，慢慢来。", ipa:"/teɪk jʊər taɪm/"},
        {date:"06/11", word:"I’m running out of time.", cn:"我时间不够了。", ipa:"/aɪm ˈrʌnɪŋ aʊt əv taɪm/"},
        {date:"06/11", word:"That makes sense.", cn:"有道理。", ipa:"/ðæt meɪks sɛns/"},
        {date:"06/12", word:"I’m considering whether to take a gap year before going to college.", cn:"我在考虑上大学前是否要休学一年。", ipa:"/aɪm kənˈsɪdərɪŋ ˈwɛðər tu teɪk ə ɡæp jɪr bɪˈfɔr ˈɡoʊɪŋ tu ˈkɑlɪdʒ/"},
        {date:"06/12", word:"This project requires close cooperation among all team members.", cn:"这个项目需要所有团队成员紧密配合。", ipa:"/ðɪs ˈprɑdʒɛkt riˈkwaɪərz kloʊs koʊˌɑpəˈreɪʃən əˈmʌŋ ɔl tim ˈmɛmbərz/"},
        {date:"06/12", word:"It is vital to keep a positive attitude when facing difficulties.", cn:"面对困难时保持积极心态至关重要。", ipa:"/ɪt ɪz ˈvaɪtəl tu kip ə ˈpɑzətɪv ˈætəˌtud wɛn ˈfeɪsɪŋ ˈdɪfɪkəltiz/"},
        {date:"06/12", word:"We need to figure out an effective solution to the problem.", cn:"我们得想出一个有效的办法来解决这个问题。", ipa:"/wi nid tu ˈfɪɡjər aʊt ən ɪˈfɛktɪv səˈluʃən tu ðə ˈprɑbləm/"},
        {date:"06/12", word:"The decision will have a long‑term influence on our future development.", cn:"这个决定会对我们未来的发展产生长期影响。", ipa:"/ðə dɪˈsɪʒən wɪl hæv ə lɔŋ-tɜrm ˈɪnfluəns ɑn ˈaʊər ˈfjutʃər dɪˈvɛləpmənt/"},
        {date:"06/13", word:"persistent", cn:"坚持不懈的", ipa:"/pərˈsɪstənt/"},{date:"06/13", word:"superior", cn:"上级", ipa:"/suˈpɪriər/"},{date:"06/13", word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪˌkeɪtɪd/"},{date:"06/13", word:"tremendous", cn:"巨大的", ipa:"/trɪˈmɛndəs/"},{date:"06/13", word:"inevitable", cn:"不可避免的", ipa:"/ɪnˈɛvɪtəbəl/"},{date:"06/13", word:"genuine", cn:"真实的", ipa:"/ˈdʒɛnjuɪn/"},{date:"06/13", word:"accomplish", cn:"完成", ipa:"/əˈkɑmplɪʃ/"},{date:"06/13", word:"prohibit", cn:"禁止", ipa:"/proʊˈhɪbɪt/"},{date:"06/13", word:"adequate", cn:"足够的", ipa:"/ˈædɪkwɪt/"},{date:"06/13", word:"profound", cn:"深刻的", ipa:"/proʊˈfaʊnd/"},
        {date:"06/14", word:"dilemma", cn:"两难选择", ipa:"/dɪˈlɛmə/"},{date:"06/14", word:"elaborate", cn:"详尽的", ipa:"/ɪˈlæbəreɪt/"},{date:"06/14", word:"illustrate", cn:"说明", ipa:"/ˈɪləˌstreɪt/"},{date:"06/14", word:"negotiate", cn:"协商", ipa:"/nɪˈɡoʊʃiˌeɪt/"},{date:"06/14", word:"remarkable", cn:"显著的", ipa:"/rɪˈmɑrkəbəl/"},{date:"06/14", word:"restrain", cn:"约束", ipa:"/rɪˈstreɪn/"},{date:"06/14", word:"simulate", cn:"模拟", ipa:"/ˈsɪmjəˌleɪt/"},{date:"06/14", word:"sustain", cn:"维持", ipa:"/səˈsteɪn/"},{date:"06/14", word:"volunteer", cn:"志愿者", ipa:"/ˌvɑlənˈtɪr/"},{date:"06/14", word:"vulnerable", cn:"脆弱的", ipa:"/ˈvʌlnərəbəl/"},
        {date:"06/15", word:"Faced with this tough dilemma, he chose to restrain his impulse.", cn:"面对两难困境，他选择克制自身冲动。", ipa:"/feɪst wɪð ðɪs tʌf dɪˈlɛmə, hi tʃoʊz tu rɪˈstreɪn hɪz ˈɪmpʌls/"},
        {date:"06/15", word:"The teacher used charts to illustrate the elaborate rules clearly.", cn:"老师借助图表，清晰阐明了这套详尽的规则。", ipa:"/ðə ˈtitʃər juzd tʃɑrts tu ˈɪləˌstreɪt ði ɪˈlæbəreɪt rulz ˈklɪrli/"},
        {date:"06/15", word:"Two sides decided to negotiate to sustain long‑term cooperation.", cn:"双方决定协商谈判，以此维持长期合作。", ipa:"/tu saɪdz dɪˈsaɪdɪd tu nɪˈɡoʊʃiˌeɪt tu səˈsteɪn lɔŋ-tɜrm koʊˌɑpəˈreɪʃən/"},
        {date:"06/15", word:"It’s remarkable that the volunteer remained calm in vulnerable situations.", cn:"这名志愿者在险境中保持镇定，表现十分出色。", ipa:"/ɪts rɪˈmɑrkəbəl ðæt ðə ˌvɑlənˈtɪr rɪˈmeɪnd kɑm ɪn ˈvʌlnərəbəl ˌsɪtʃuˈeɪʃənz/"},
        {date:"06/15", word:"The machine can simulate natural scenes for daily training.", cn:"这台设备可以模拟自然场景，用于日常训练。", ipa:"/ðə məˈʃin kæn ˈsɪmjəˌleɪt ˈnætʃərəl sinz fɔr ˈdeɪli ˈtreɪnɪŋ/"},
        {date:"06/16", word:"persistent", cn:"坚持不懈的", ipa:"/pərˈsɪstənt/"},{date:"06/16", word:"He is persistent in pursuing his dreams.", cn:"他坚持不懈地追逐自己的梦想。", ipa:"/hi ɪz pərˈsɪstənt ɪn pərˈsuɪŋ hɪz drimz/"},
        {date:"06/16", word:"superior", cn:"优越的", ipa:"/suˈpɪriər/"},{date:"06/16", word:"Her work quality is superior to others.", cn:"她的工作质量优于其他人。", ipa:"/hɜr wɜrk ˈkwɑləti ɪz suˈpɪriər tu ˈʌðərz/"},
        {date:"06/16", word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪˌkeɪtɪd/"},{date:"06/16", word:"This is a sophisticated medical instrument.", cn:"这是一台精密复杂的医疗仪器。", ipa:"/ðɪs ɪz ə səˈfɪstɪˌkeɪtɪd ˈmɛdɪkəl ˈɪnstrəmənt/"},
        {date:"06/16", word:"tremendous", cn:"巨大的", ipa:"/trɪˈmɛndəs/"},{date:"06/16", word:"We made tremendous progress this year.", cn:"今年我们取得了巨大的进步。", ipa:"/wi meɪd trɪˈmɛndəs ˈprɑɡrəs ðɪs jɪr/"},
        {date:"06/16", word:"inevitable", cn:"不可避免的", ipa:"/ɪnˈɛvɪtəbəl/"},{date:"06/16", word:"Change is an inevitable part of life.", cn:"改变是人生不可避免的一部分。", ipa:"/tʃeɪndʒ ɪz ən ɪnˈɛvɪtəbəl pɑrt əv laɪf/"},
        {date:"06/16", word:"genuine", cn:"真诚的", ipa:"/ˈdʒɛnjuɪn/"},{date:"06/16", word:"She showed genuine concern for me.", cn:"她对我流露出真诚的关心。", ipa:"/ʃi ʃoʊd ˈdʒɛnjuɪn kənˈsɜrn fɔr mi/"},
        {date:"06/17", word:"Cherish every ordinary day.", cn:"珍惜每一个平凡日子。", ipa:"/ˈtʃɛrɪʃ ˈɛvri ˈɔrdəˌnɛri deɪ/"},
        {date:"06/17", word:"Warm days are worth remembering.", cn:"温暖的时光值得铭记。", ipa:"/wɔrm deɪz ɑr wɜrθ rɪˈmɛmbərɪŋ/"},
        {date:"06/17", word:"Simple days bring peace of mind.", cn:"平淡日子，内心安然。", ipa:"/ˈsɪmpəl deɪz brɪŋ pis əv maɪnd/"},
        {date:"06/17", word:"Bright days await us ahead.", cn:"前路尽是明朗时日。", ipa:"/braɪt deɪz əˈweɪt ʌs əˈhɛd/"},
        {date:"06/17", word:"Slow down and enjoy your days.", cn:"放慢脚步，好好度日。", ipa:"/sloʊ daʊn ænd ɛnˈdʒɔɪ jʊər deɪz/"}
    ];

    let currentQueue = [];
    let fuzzyQueue = [];

    function playAudio() {
        if(currentQueue.length > 0) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQueue[0].word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    }

    function initGame() {
        const filter = document.getElementById('dateFilter').value;
        currentQueue = filter === 'all' ? [...wordList] : wordList.filter(w => w.date === filter);
        fuzzyQueue = [];
        showCard();
    }

    function showCard() {
        if (currentQueue.length === 0) {
            if (fuzzyQueue.length > 0) {
                currentQueue = [...fuzzyQueue];
                fuzzyQueue = [];
                showCard();
            } else {
                alert("太棒了！已全部刷完。");
                initGame();
            }
            return;
        }
        const w = currentQueue[0];
        document.getElementById('en').innerText = w.word;
        document.getElementById('cn').innerText = w.cn;
        document.getElementById('ipa').innerText = w.ipa;
    }

    function handleCardClick() {
        document.getElementById('card').classList.toggle('flipped');
        playAudio(); 
    }

    function mark(type) {
        const word = currentQueue.shift();
        if (type === 'fuzzy') fuzzyQueue.push(word);
        document.getElementById('card').classList.remove('flipped');
        setTimeout(showCard, 300);
    }
    
    initGame();
</script>
</body>
</html>
