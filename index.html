<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日打卡系统-全量音标版</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card-container { width: 320px; height: 220px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; text-align: center; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-direction: column; align-items: center;}
        button { padding: 8px 16px; border: none; border-radius: 20px; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="refreshAll()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="updateContent()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card-container" onclick="document.getElementById('card').classList.toggle('flipped')">
    <div class="card" id="card">
        <div class="face front">
            <div id="counter" style="font-size:0.8rem; color:#aaa; margin-bottom:5px;"></div>
            <h2 id="en-front" style="font-size:1.1rem;">点击开始</h2>
            <div id="cn-front" style="color:#666; margin-top:10px;"></div>
        </div>
        <div class="face back">
            <div id="ipa-back" style="color:#d35400; font-size:0.9rem; margin-bottom:8px;"></div>
            <div id="cn-back" style="font-size:1.1rem; font-weight:bold;"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button onclick="playAudio(event)">🔊 发音</button>
    <button onclick="nextWord(event)">下一条</button>
</div>

        {date:"06/08", type:'sentence', word:"Success belongs to those who dare to dream and persevere.", cn:"成功属于敢于梦想、坚持不懈的人。", ipa:"/səkˈses bɪˈlɒŋz tu ðəʊz hu deə(r) tu driːm ænd ˌpɜːsɪˈvɪə(r)/"},{date:"06/08", type:'sentence', word:"An ambitious person always strives to improve themselves.", cn:"有抱负的人总在努力提升自我。", ipa:"/ən æmˈbɪʃəs ˈpɜːsn ˈɔːlweɪz straɪvz tu ɪmˈpruːv ðəmˈselvz/"},{date:"06/08", type:'sentence', word:"We should cherish every opportunity to learn new knowledge.", cn:"我们应当珍惜每一个学习新知识的机会。", ipa:"/wi ʃʊd ˈtʃerɪʃ ˈevri ˌɒpəˈtjuːnəti tu lɜːn njuː ˈnɒlɪdʒ/"},{date:"06/08", type:'sentence', word:"Teamwork plays an important role in college life.", cn:"团队协作在大学生活中十分重要。", ipa:"/ˈtiːmwɜːk pleɪz ən ɪmˈpɔːtnt rəʊl ɪn ˈkɒlɪdʒ laɪf/"},{date:"06/08", type:'sentence', word:"Never give up when you meet difficulties on the way to your goals.", cn:"在追逐目标的路上遇到困难，切莫放弃。", ipa:"/ˈnevə ɡɪv ʌp wen ju miːt ˈdɪfɪkəltiz ɒn ðə weɪ tu jɔː(r) ɡəʊlz/"},
        {date:"06/09", type:'sentence', word:"College life is full of new challenges and opportunities.", cn:"大学生活充满了新的挑战与机遇。", ipa:"/ˈkɒlɪdʒ laɪf ɪz fʊl əv njuː ˈtʃælɪndʒɪz ænd ˌɒpəˈtjuːnətiz/"},{date:"06/09", type:'sentence', word:"Keep moving forward.", cn:"勇往直前。", ipa:"/kiːp ˈmuːvɪŋ ˈfɔːwəd/"},{date:"06/09", type:'sentence', word:"Never give up easily.", cn:"切勿轻言放弃。", ipa:"/ˈnevə ɡɪv ʌp ˈiːzəli/"},{date:"06/09", type:'sentence', word:"Knowledge is power.", cn:"知识就是力量。", ipa:"/ˈnɒlɪdʒ ɪz ˈpaʊə(r)/"},{date:"06/09", type:'sentence', word:"Learn to be independent.", cn:"学会独立。", ipa:"/lɜːn tu bi ˌɪndɪˈpendənt/"},
        {date:"06/10", type:'sentence', word:"Only by striving constantly can we embrace a promising future and realize our life values.", cn:"唯有不懈奋斗，方能拥抱美好未来，实现人生价值。", ipa:"/ˈəʊnli baɪ ˈstraɪvɪŋ ˈkɒnstəntli kæn wi ɪmˈbreɪs ə ˈprɒmɪsɪŋ ˈfjuːtʃə(r) ænd ˈrɪəlaɪz ˈaʊə(r) laɪf ˈvæljuːz/"},{date:"06/10", type:'sentence', word:"Those who dare to challenge difficulties are more likely to gain extraordinary achievements in the long run.", cn:"敢于直面困境的人，终有机会收获不凡的成就。", ipa:"/ðəʊz hu deə(r) tu ˈtʃælɪndʒ ˈdɪfɪkəltiz ɑː(r) mɔː(r) ˈlaɪkli tu ɡeɪn ɪkˈstrɔːdnri əˈtʃiːvmənts ɪn ðə lɒŋ rʌn/"},{date:"06/10", type:'sentence', word:"What really matters is not where you start, but how firmly you stick to your original dream.", cn:"真正重要的不是起点，而是坚守初心的决心。", ipa:"/wɒt ˈrɪəli ˈmætəz ɪz nɒt weə(r) ju stɑːt, bʌt haʊ ˈfɜːmli ju stɪk tu jɔː(r) əˈrɪdʒənl driːm/"},{date:"06/10", type:'sentence', word:"Adversity tends to shape strong wills and make people grow faster than ease and comfort.", cn:"逆境磨砺意志，远比安逸更能催人成长。", ipa:"/ədˈvɜːsəti tendz tu ʃeɪp strɒŋ wɪlz ænd meɪk ˈpiːpl ɡrəʊ ˈfɑːstə(r) ðæn iːz ænd ˈkʌmfət/"},{date:"06/10", type:'sentence', word:"We should learn to reflect on ourselves so as to avoid repeating past mistakes and make steady progress.", cn:"我们应学会自省，规避过往失误，稳步前行。", ipa:"/wi ʃʊd lɜːn tu rɪˈflekt ɒn ˈaʊə(r) selvz səʊ æz tu əˈvɔɪd rɪˈpiːtɪŋ pɑːst mɪˈsteɪks ænd meɪk ˈstedi ˈprəʊɡres/"},
        {date:"06/11", type:'sentence', word:"Could you give me a hand?", cn:"能帮我一下吗？", ipa:"/kʊd ju ɡɪv miː ə hænd/"},{date:"06/11", type:'sentence', word:"It’s up to you.", cn:"由你决定。", ipa:"/ɪts ʌp tu ju/"},{date:"06/11", type:'sentence', word:"Take your time.", cn:"别着急，慢慢来。", ipa:"/teɪk jɔː(r) taɪm/"},{date:"06/11", type:'sentence', word:"I’m running out of time.", cn:"我时间不够了。", ipa:"/aɪm ˈrʌnɪŋ aʊt əv taɪm/"},{date:"06/11", type:'sentence', word:"That makes sense.", cn:"有道理。", ipa:"/ðæt meɪks sens/"},
        {date:"06/12", type:'sentence', word:"I’m considering whether to take a gap year before going to college.", cn:"我在考虑上大学前是否要休学一年。", ipa:"/aɪm kənˈsɪdərɪŋ ˈweðə(r) tu teɪk ə ɡæp jɪə(r) bɪˈfɔː(r) ˈɡəʊɪŋ tu ˈkɒlɪdʒ/"},{date:"06/12", type:'sentence', word:"This project requires close cooperation among all team members.", cn:"这个项目需要所有团队成员紧密配合。", ipa:"/ðɪs ˈprɒdʒekt rɪˈkwaɪəz kləʊs kəʊˌɒpəˈreɪʃn əˈmʌŋ ɔːl tiːm ˈmembəz/"},{date:"06/12", type:'sentence', word:"It is vital to keep a positive attitude when facing difficulties.", cn:"面对困难时保持积极心态至关重要。", ipa:"/ɪt ɪz ˈvaɪtl tu kiːp ə ˈpɒzətɪv ˈætɪtjuːd wen ˈfeɪsɪŋ ˈdɪfɪkəltiz/"},{date:"06/12", type:'sentence', word:"We need to figure out an effective solution to the problem.", cn:"我们得想出一个有效的办法来解决这个问题。", ipa:"/wi niːd tu ˈfɪɡə(r) aʊt ən ɪˈfektɪv səˈluːʃn tu ðə ˈprɒbləm/"},{date:"06/12", type:'sentence', word:"The decision will have a long-term influence on our future development.", cn:"这个决定会对我们未来的发展产生长期影响。", ipa:"/ðə dɪˈsɪʒn wɪl hæv ə lɒŋ tɜːm ˈɪnfluəns ɒn ˈaʊə(r) ˈfjuːtʃə(r) dɪˈveləpmənt/"},
        {date:"06/13", type:'word', word:"persistent", cn:"坚持不懈的", ipa:"/pəˈsɪstənt/"},{date:"06/13", type:'word', word:"superior", cn:"上级", ipa:"/suːˈpɪəriə(r)/"},{date:"06/13", type:'word', word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪkeɪtɪd/"},{date:"06/13", type:'word', word:"tremendous", cn:"巨大的", ipa:"/trɪˈmendəs/"},{date:"06/13", type:'word', word:"inevitable", cn:"不可避免的", ipa:"/ɪnˈevɪtəbl/"},{date:"06/13", type:'word', word:"genuine", cn:"真实的", ipa:"/ˈdʒenjuɪn/"},{date:"06/13", type:'word', word:"accomplish", cn:"完成", ipa:"/əˈkʌmplɪʃ/"},{date:"06/13", type:'word', word:"prohibit", cn:"禁止", ipa:"/prəˈhɪbɪt/"},{date:"06/13", type:'word', word:"adequate", cn:"足够的", ipa:"/ˈædɪkwət/"},{date:"06/13", type:'word', word:"profound", cn:"深刻的", ipa:"/prəˈfaʊnd/"},
        {date:"06/14", type:'word', word:"dilemma", cn:"两难选择", ipa:"/dɪˈlemə/"},{date:"06/14", type:'word', word:"elaborate", cn:"详尽的", ipa:"/ɪˈlæbərət/"},{date:"06/14", type:'word', word:"illustrate", cn:"说明", ipa:"/ˈɪləstreɪt/"},{date:"06/14", type:'word', word:"negotiate", cn:"协商", ipa:"/nɪˈɡəʊʃieɪt/"},{date:"06/14", type:'word', word:"remarkable", cn:"显著的", ipa:"/rɪˈmɑːkəbl/"},{date:"06/14", type:'word', word:"restrain", cn:"约束", ipa:"/rɪˈstreɪn/"},{date:"06/14", type:'word', word:"simulate", cn:"模拟", ipa:"/ˈsɪmjuleɪt/"},{date:"06/14", type:'word', word:"sustain", cn:"维持", ipa:"/səˈsteɪn/"},{date:"06/14", type:'word', word:"volunteer", cn:"志愿者", ipa:"/ˌvɒlənˈtɪə(r)/"},{date:"06/14", type:'word', word:"vulnerable", cn:"脆弱的", ipa:"/ˈvʌlnərəbl/"},
        {date:"06/15", type:'sentence', word:"Faced with this tough dilemma, he chose to restrain his impulse.", cn:"面对两难困境，他选择克制自身冲动。", ipa:"/feɪst wɪð ðɪs tʌf dɪˈlemə, hi tʃəʊz tu rɪˈstreɪn hɪz ˈɪmpʌls/"},{date:"06/15", type:'sentence', word:"The teacher used charts to illustrate the elaborate rules clearly.", cn:"老师借助图表，清晰阐明了这套详尽的规则。", ipa:"/ðə ˈtiːtʃə(r) juːzd tʃɑːts tu ˈɪləstreɪt ði ɪˈlæbərət ruːlz ˈklɪəli/"},{date:"06/15", type:'sentence', word:"Two sides decided to negotiate to sustain long-term cooperation.", cn:"双方决定协商谈判，以此维持长期合作。", ipa:"/tuː saɪdz dɪˈsaɪdɪd tu nɪˈɡəʊʃieɪt tu səˈsteɪn lɒŋ tɜːm kəʊˌɒpəˈreɪʃn/"},{date:"06/15", type:'sentence', word:"It’s remarkable that the volunteer remained calm in vulnerable situations.", cn:"这名志愿者在险境中保持镇定，表现十分出色。", ipa:"/ɪts rɪˈmɑːkəbl ðæt ðə ˌvɒlənˈtɪə(r) rɪˈmeɪnd kɑːm ɪn ˈvʌlnərəbl ˌsɪtʃuˈeɪʃnz/"},{date:"06/15", type:'sentence', word:"The machine can simulate natural scenes for daily training.", cn:"这台设备可以模拟自然场景，用于日常训练。", ipa:"/ðə məˈʃiːn kæn ˈsɪmjuleɪt ˈnætʃrəl siːnz fɔː(r) ˈdeɪli ˈtreɪnɪŋ/"},
        {date:"06/16", type:'word', word:"persistent", cn:"坚持不懈的", ipa:"/pəˈsɪstənt/"},{date:"06/16", type:'word', word:"superior", cn:"上级；优越的", ipa:"/suːˈpɪəriə(r)/"},{date:"06/16", type:'word', word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪkeɪtɪd/"},{date:"06/16", type:'word', word:"tremendous", cn:"巨大的", ipa:"/trɪˈmendəs/"},{date:"06/16", type:'word', word:"inevitable", cn:"不可避免的", ipa:"/ɪnˈevɪtəbl/"},{date:"06/16", type:'word', word:"genuine", cn:"真实的；真诚的", ipa:"/ˈdʒenjuɪn/"},
        {date:"06/17", type:'sentence', word:"Cherish every ordinary day.", cn:"珍惜每一个平凡日子。", ipa:"/ˈtʃerɪʃ ˈevri ˈɔːdnri deɪ/"},{date:"06/17", type:'sentence', word:"Warm days are worth remembering.", cn:"温暖的时光值得铭记。", ipa:"/wɔːm deɪz ɑː(r) wɜːθ rɪˈmembərɪŋ/"},{date:"06/17", type:'sentence', word:"Simple days bring peace of mind.", cn:"平淡日子，内心安然。", ipa:"/ˈsɪmpl deɪz brɪŋ piːs əv maɪnd/"},{date:"06/17", type:'sentence', word:"Bright days await us ahead.", cn:"前路尽是明朗时日。", ipa:"/braɪt deɪz əˈweɪt ʌz əˈhed/"},{date:"06/17", type:'sentence', word:"Slow down and enjoy your days.", cn:"放慢脚步，好好度日。", ipa:"/sləʊ daʊn ænd ɪnˈdʒɔɪ jɔː(r) deɪz/"}
    ];

    let currentList = []; let idx = 0;
    function refreshAll() { const mode = document.getElementById('modeFilter').value; const sel = document.getElementById('dateFilter'); const oldDate = sel.value; sel.innerHTML = '<option value="all">-- 请选择日期 --</option>'; const dates = [...new Set(wordList.filter(i => mode === 'all' || i.type === mode).map(i => i.date))].sort(); dates.forEach(d => { let o = document.createElement('option'); o.value=d; o.innerText=d; sel.appendChild(o); }); if(dates.includes(oldDate)) sel.value = oldDate; updateContent(); }
    function updateContent() { const mode = document.getElementById('modeFilter').value; const date = document.getElementById('dateFilter').value; currentList = wordList.filter(i => (mode === 'all' || i.type === mode) && (date === 'all' || i.date === date)); idx = 0; render(); }
    function render() { document.getElementById('card').classList.remove('flipped'); if(currentList.length > 0) { document.getElementById('en-front').innerText = currentList[idx].word; document.getElementById('cn-front').innerText = currentList[idx].cn; document.getElementById('ipa-back').innerText = currentList[idx].ipa; document.getElementById('cn-back').innerText = currentList[idx].cn; document.getElementById('counter').innerText = (idx + 1) + " / " + currentList.length; } else { document.getElementById('en-front').innerText = "无内容"; document.getElementById('cn-front').innerText = ""; document.getElementById('counter').innerText = ""; } }
    function nextWord(e) { e.stopPropagation(); if(currentList.length > 0) { idx = (idx + 1) % currentList.length; render(); } }
    function playAudio(e) { e.stopPropagation(); if(currentList.length > 0) { const u = new SpeechSynthesisUtterance(currentList[idx].word); u.lang='en-US'; window.speechSynthesis.speak(u); } }
    refreshAll();
</script>
