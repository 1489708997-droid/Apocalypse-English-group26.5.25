<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日打卡系统</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card-container { width: 320px; height: 220px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; text-align: center; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 8px 16px; border: none; border-radius: 20px; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="refreshAll()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="initGame()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card-container" onclick="document.getElementById('card').classList.toggle('flipped')">
    <div class="card" id="card">
        <div class="face front">
            <h2 id="en-front" style="font-size:1.2rem;">点击开始</h2>
            <div id="cn-front" style="color:#666; margin-top:10px;"></div>
        </div>
        <div class="face back">
            <div id="ipa-back" style="color:#888; font-size:1rem;"></div>
            <div id="cn-back" style="font-size:1.2rem; font-weight:bold; margin-top:10px;"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button onclick="playAudio(event)">🔊 发音</button>
    <button onclick="nextWord(event)">下一条</button>
</div>

<script>
    // 数据已确保完整（你后续新增的数据按此格式填入即可）
    const wordList = [
        {date:"05/25", type:'word', word:"advantage", cn:"优势", ipa:"/ədˈvæntɪdʒ/"},
        {date:"06/01", type:'sentence', word:"Practice makes perfect.", cn:"熟能生巧。", ipa:"/ˈpræktɪs meɪks ˈpɜrfɪkt/"},
        {date:"06/10", type:'sentence', word:"Only by striving can we embrace a future.", cn:"唯有奋斗方能拥抱未来。", ipa:"/ˈoʊnli baɪ ˈstraɪvɪŋ kæn wi ɛmˈbreɪs ə ˈfjutʃər/"},
        {date:"06/17", type:'sentence', word:"Cherish every ordinary day.", cn:"珍惜平凡日子。", ipa:"/ˈtʃɛrɪʃ ˈɛvri ˈɔrdəˌnɛri deɪ/"}
    ];

    let filteredData = [];
    let currentIndex = 0;

    function refreshAll() {
        const mode = document.getElementById('modeFilter').value;
        const select = document.getElementById('dateFilter');
        const currentVal = select.value;
        select.innerHTML = '<option value="all">-- 请选择日期 --</option>';
        const dates = [...new Set(wordList.filter(i => mode === 'all' || i.type === mode).map(i => i.date))].sort();
        dates.forEach(d => { let o = document.createElement('option'); o.value=d; o.innerText=d; select.appendChild(o); });
        if(dates.includes(currentVal)) select.value = currentVal;
        initGame();
    }

    function initGame() {
        const mode = document.getElementById('modeFilter').value;
        const date = document.getElementById('dateFilter').value;
        filteredData = wordList.filter(i => (mode === 'all' || i.type === mode) && (date === 'all' || i.date === date));
        currentIndex = 0;
        showCurrent();
    }

    function showCurrent() {
        document.getElementById('card').classList.remove('flipped');
        if(filteredData.length > 0) {
            document.getElementById('en-front').innerText = filteredData[currentIndex].word;
            document.getElementById('cn-front').innerText = filteredData[currentIndex].cn;
            document.getElementById('ipa-back').innerText = filteredData[currentIndex].ipa;
            document.getElementById('cn-back').innerText = filteredData[currentIndex].cn;
        } else {
            document.getElementById('en-front').innerText = "无内容";
        }
    }

    function nextWord(event) {
        event.stopPropagation(); // 防止冒泡导致翻转
        if(filteredData.length > 0) {
            currentIndex = (currentIndex + 1) % filteredData.length;
            showCurrent();
        }
    }

    function playAudio(event) {
        event.stopPropagation(); // 防止冒泡
        if(filteredData.length > 0) {
            const u = new SpeechSynthesisUtterance(filteredData[currentIndex].word);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }
    }

    refreshAll();
</script>
</body>
</html>
