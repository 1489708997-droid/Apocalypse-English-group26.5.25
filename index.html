<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日打卡系统-全量核对版</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card-container { width: 320px; height: 220px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; text-align: center; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-direction: column; align-items: center;}
        .btns { display: flex; gap: 10px; }
        button { padding: 8px 16px; border: none; border-radius: 20px; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="refreshAll()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="updateContent()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card-container" onclick="document.getElementById('card').classList.toggle('flipped')">
    <div class="card" id="card">
        <div class="face front">
            <div id="counter" style="font-size:0.8rem; color:#aaa; margin-bottom:5px;"></div>
            <h2 id="en-front" style="font-size:1.2rem;">点击开始</h2>
            <div id="cn-front" style="color:#666; margin-top:10px;"></div>
        </div>
        <div class="face back">
            <div id="ipa-back" style="color:#888; font-size:1rem;"></div>
            <div id="cn-back" style="font-size:1.2rem; font-weight:bold; margin-top:10px;"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <div class="btns">
        <button onclick="playAudio(event)">🔊 发音</button>
        <button onclick="nextWord(event)">下一条</button>
    </div>
    <div id="msg" style="font-size:0.8rem; color:#d35400;"></div>
</div>

<script>
    // 全量数据：已根据 05/25 - 06/17 的数据要求完成补全
    const wordList = [
        {date:"05/25", type:'word', word:"advantage", cn:"优势", ipa:"/ədˈvæntɪdʒ/"},{date:"05/25", type:'word', word:"abandon", cn:"抛弃", ipa:"/əˈbændən/"},{date:"05/25", type:'word', word:"achieve", cn:"实现", ipa:"/əˈtʃiv/"},{date:"05/25", type:'word', word:"benefit", cn:"益处", ipa:"/ˈbɛnəfɪt/"},{date:"05/25", type:'word', word:"challenge", cn:"挑战", ipa:"/ˈtʃæləndʒ/"},{date:"05/25", type:'word', word:"confident", cn:"自信", ipa:"/ˈkɑnfɪdənt/"},{date:"05/25", type:'word', word:"determine", cn:"衡量", ipa:"/dɪˈtɜrmɪn/"},{date:"05/25", type:'word', word:"efficient", cn:"高效", ipa:"/ɪˈfɪʃənt/"},{date:"05/25", type:'word', word:"frequent", cn:"频繁", ipa:"/ˈfrikwənt/"},{date:"05/25", type:'word', word:"volunteer", cn:"志愿者", ipa:"/ˌvɑlənˈtɪr/"},
        {date:"05/26", type:'word', word:"admit", cn:"承认", ipa:"/ədˈmɪt/"},{date:"05/26", type:'word', word:"afford", cn:"买得起", ipa:"/əˈfɔrd/"},{date:"05/26", type:'word', word:"agreement", cn:"协议", ipa:"/əˈɡrimənt/"},{date:"05/26", type:'word', word:"alarm", cn:"警报", ipa:"/əˈlɑrm/"},{date:"05/26", type:'word', word:"allow", cn:"允许", ipa:"/əˈlaʊ/"},{date:"05/26", type:'word', word:"amaze", cn:"被惊到", ipa:"/əˈmeɪz/"},{date:"05/26", type:'word', word:"ancient", cn:"古代的", ipa:"/ˈeɪnʃənt/"},{date:"05/26", type:'word', word:"announce", cn:"宣布", ipa:"/əˈnaʊns/"},{date:"05/26", type:'word', word:"anxious", cn:"焦虑", ipa:"/ˈæŋkʃəs/"},{date:"05/26", type:'word', word:"apologize", cn:"道歉", ipa:"/əˈpɑləˌdʒaɪz/"},
        {date:"05/27", type:'word', word:"sunshine", cn:"阳光", ipa:"/ˈsʌnˌʃaɪn/"},{date:"05/27", type:'word', word:"breeze", cn:"微风", ipa:"/briz/"},{date:"05/27", type:'word', word:"dream", cn:"梦想", ipa:"/drim/"},{date:"05/27", type:'word', word:"gentle", cn:"温柔的", ipa:"/ˈdʒɛntəl/"},{date:"05/27", type:'word', word:"journey", cn:"旅途", ipa:"/ˈdʒɜrni/"},{date:"05/27", type:'word', word:"smile", cn:"微笑", ipa:"/smaɪl/"},{date:"05/27", type:'word', word:"courage", cn:"勇气", ipa:"/ˈkɜrɪdʒ/"},{date:"05/27", type:'word', word:"flower", cn:"花朵", ipa:"/ˈflaʊər/"},{date:"05/27", type:'word', word:"peace", cn:"平静", ipa:"/pis/"},{date:"05/27", type:'word', word:"cherish", cn:"珍惜", ipa:"/ˈtʃɛrɪʃ/"},
        {date:"05/28", type:'word', word:"challenge", cn:"挑战", ipa:"/ˈtʃæləndʒ/"},{date:"05/28", type:'word', word:"conclude", cn:"推断", ipa:"/kənˈklud/"},{date:"05/28", type:'word', word:"decorate", cn:"装饰", ipa:"/ˈdɛkəˌreɪt/"},{date:"05/28", type:'word', word:"economy", cn:"经济", ipa:"/ɪˈkɑnəmi/"},{date:"05/28", type:'word', word:"flexible", cn:"灵活的", ipa:"/ˈflɛksəbəl/"},{date:"05/28", type:'word', word:"guarantee", cn:"保证", ipa:"/ˌɡærənˈti/"},{date:"05/28", type:'word', word:"hesitate", cn:"犹豫", ipa:"/ˈhɛzɪˌteɪt/"},{date:"05/28", type:'word', word:"inspire", cn:"激励", ipa:"/ɪnˈspaɪər/"},{date:"05/28", type:'word', word:"mysterious", cn:"神秘的", ipa:"/mɪˈstɪriəs/"},{date:"05/28", type:'word', word:"regulate", cn:"调节", ipa:"/ˈrɛɡjəˌreɪt/"},
        {date:"05/29", type:'word', word:"bargain", cn:"讲价", ipa:"/ˈbɑrɡɪn/"},{date:"05/29", type:'word', word:"campaign", cn:"竞选", ipa:"/kæmˈpeɪn/"},{date:"05/29", type:'word', word:"declare", cn:"声明", ipa:"/dɪˈklɛr/"},{date:"05/29", type:'word', word:"explore", cn:"探索", ipa:"/ɪkˈsplɔr/"},{date:"05/29", type:'word', word:"frequent", cn:"频繁的", ipa:"/ˈfrikwənt/"},{date:"05/29", type:'word', word:"color", cn:"颜色", ipa:"/ˈkʌlər/"},{date:"05/29", type:'word', word:"immigrant", cn:"移民", ipa:"/ˈɪmɪɡrənt/"},{date:"05/29", type:'word', word:"luggage", cn:"行李", ipa:"/ˈlʌɡɪdʒ/"},{date:"05/29", type:'word', word:"mystery", cn:"神秘", ipa:"/ˈmɪstəri/"},{date:"05/29", type:'word', word:"occupy", cn:"占据", ipa:"/ˈɑkjəˌpaɪ/"},
        {date:"05/30", type:'word', word:"accelerate", cn:"加速", ipa:"/ækˈsɛləˌreɪt/"},{date:"05/30", type:'word', word:"apparent", cn:"明显", ipa:"/əˈpɛrənt/"},{date:"05/30", type:'word', word:"brilliant", cn:"杰出", ipa:"/ˈbrɪljənt/"},{date:"05/30", type:'word', word:"desperate", cn:"绝望的", ipa:"/ˈdɛspərɪt/"},{date:"05/30", type:'word', word:"distinguish", cn:"区别", ipa:"/dɪˈstɪŋɡwɪʃ/"},{date:"05/30", type:'word', word:"private", cn:"私人", ipa:"/ˈpraɪvɪt/"},{date:"05/30", type:'word', word:"resist", cn:"抵抗", ipa:"/rɪˈzɪst/"},{date:"05/30", type:'word', word:"restroom", cn:"洗手间", ipa:"/ˈrɛstruːm/"},{date:"05/30", type:'word', word:"honor", cn:"荣耀", ipa:"/ˈɑnər/"},{date:"05/30", type:'word', word:"goal", cn:"目标", ipa:"/ɡoʊl/"},
        {date:"05/31", type:'sentence', word:"Every effort pays off.", cn:"努力终有回报。", ipa:"/ˈɛvri ˈɛfərt peɪz ɔf/"},
        {date:"06/01", type:'sentence', word:"Practice makes perfect.", cn:"熟能生巧。", ipa:"/ˈpræktɪs meɪks ˈpɜrfɪkt/"},{date:"06/02", type:'sentence', word:"Life is full of small surprises.", cn:"生活充满惊喜。", ipa:"/laɪf ɪz fʊl əv smɔl sərˈpraɪzəz/"},{date:"06/03", type:'sentence', word:"What matters most is sticking to reading.", cn:"最重要的是坚持阅读。", ipa:"/wʌt ˈmætərz moʊst ɪz ˈstɪkɪŋ tu ˈridɪŋ/"},{date:"06/04", type:'sentence', word:"I'm running a little late.", cn:"我稍微晚点到。", ipa:"/aɪm ˈrʌnɪŋ ə ˈlɪtəl leɪt/"},{date:"06/05", type:'sentence', word:"Good manners leave a deep impression.", cn:"良好的修养给人深刻印象。", ipa:"/ɡʊd ˈmænərz liv ə dip ɪmˈprɛʃən/"},{date:"06/06", type:'sentence', word:"Self-discipline lays the foundation.", cn:"自律打下根基。", ipa:"/ˌsɛlf ˈdɪsəplɪn leɪz ðə faʊnˈdeɪʃən/"},{date:"06/07", type:'word', word:"plenty", cn:"大量", ipa:"/ˈplɛnti/"},{date:"06/08", type:'sentence', word:"Teamwork is important.", cn:"团队协作很重要。", ipa:"/ˈtimˌwɜrk ɪz ɪmˈpɔrtənt/"},{date:"06/09", type:'sentence', word:"Knowledge is power.", cn:"知识就是力量。", ipa:"/ˈnɑlɪdʒ ɪz ˈpaʊər/"},{date:"06/10", type:'sentence', word:"Only by striving can we embrace a future.", cn:"唯有奋斗方能拥抱未来。", ipa:"/ˈoʊnli baɪ ˈstraɪvɪŋ kæn wi ɛmˈbreɪs ə ˈfjutʃər/"},{date:"06/11", type:'sentence', word:"It’s up to you.", cn:"由你决定。", ipa:"/ɪts ʌp tu ju/"},{date:"06/12", type:'sentence', word:"I’m considering a gap year.", cn:"我在考虑休学一年。", ipa:"/aɪm kənˈsɪdərɪŋ ə ɡæp jɪr/"},{date:"06/13", type:'word', word:"persistent", cn:"坚持不懈的", ipa:"/pərˈsɪstənt/"},{date:"06/14", type:'word', word:"dilemma", cn:"两难选择", ipa:"/dɪˈlɛmə/"},{date:"06/15", type:'sentence', word:"He chose to restrain his impulse.", cn:"他选择克制自身冲动。", ipa:"/hi tʃoʊz tu rɪˈstreɪn hɪz ˈɪmpʌls/"},{date:"06/16", type:'word', word:"sophisticated", cn:"复杂精密的", ipa:"/səˈfɪstɪˌkeɪtɪd/"},
        {date:"06/17", type:'sentence', word:"Cherish every ordinary day.", cn:"珍惜每一个平凡日子。", ipa:"/ˈtʃɛrɪʃ ˈɛvri ˈɔrdəˌnɛri deɪ/"},
        {date:"06/17", type:'sentence', word:"Success requires persistence.", cn:"成功需要坚持。", ipa:"/səkˈsɛs rɪˈkwaɪərz pərˈsɪstəns/"},
        {date:"06/17", type:'sentence', word:"Opportunities favor the prepared.", cn:"机会垂青有准备的人。", ipa:"/ˌɑpərˈtunɪtiz ˈfeɪvər ðə prɪˈpɛrd/"},
        {date:"06/17", type:'sentence', word:"Keep moving forward.", cn:"不断前行。", ipa:"/kip ˈmuvɪŋ ˈfɔrwərd/"},
        {date:"06/17", type:'sentence', word:"Hard work leads to success.", cn:"勤奋导向成功。", ipa:"/hɑrd wɜrk lidz tu səkˈsɛs/"},
        {date:"06/17", type:'sentence', word:"Believe in yourself.", cn:"相信你自己。", ipa:"/bɪˈliv ɪn jʊərˈsɛlf/"}
    ];

    let currentList = []; let idx = 0;
    function refreshAll() { const mode = document.getElementById('modeFilter').value; const sel = document.getElementById('dateFilter'); const oldDate = sel.value; sel.innerHTML = '<option value="all">-- 请选择日期 --</option>'; const dates = [...new Set(wordList.filter(i => mode === 'all' || i.type === mode).map(i => i.date))].sort(); dates.forEach(d => { let o = document.createElement('option'); o.value=d; o.innerText=d; sel.appendChild(o); }); if(dates.includes(oldDate)) sel.value = oldDate; updateContent(); }
    function updateContent() { const mode = document.getElementById('modeFilter').value; const date = document.getElementById('dateFilter').value; currentList = wordList.filter(i => (mode === 'all' || i.type === mode) && (date === 'all' || i.date === date)); idx = 0; document.getElementById('msg').innerText = ""; render(); }
    function render() { document.getElementById('card').classList.remove('flipped'); if(currentList.length > 0) { document.getElementById('en-front').innerText = currentList[idx].word; document.getElementById('cn-front').innerText = currentList[idx].cn; document.getElementById('ipa-back').innerText = currentList[idx].ipa; document.getElementById('cn-back').innerText = currentList[idx].cn; document.getElementById('counter').innerText = (idx + 1) + " / " + currentList.length; } else { document.getElementById('en-front').innerText = "无内容"; document.getElementById('cn-front').innerText = ""; document.getElementById('counter').innerText = ""; } }
    function nextWord(e) { e.stopPropagation(); if(currentList.length > 1) { idx = (idx + 1) % currentList.length; render(); } else { document.getElementById('msg').innerText = "已是最后一条"; } }
    function playAudio(e) { e.stopPropagation(); if(currentList.length > 0) { const u = new SpeechSynthesisUtterance(currentList[idx].word); u.lang='en-US'; window.speechSynthesis.speak(u); } }
    refreshAll();
</script>
</body>
</html>
