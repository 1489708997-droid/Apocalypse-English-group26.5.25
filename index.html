<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日单词打卡</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; box-sizing: border-box; }
        .controls-top { margin-bottom: 10px; }
        .card-container { width: 85vw; height: 300px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        button { padding: 15px 25px; border: none; border-radius: 30px; background: var(--primary); color: white; cursor: pointer; font-size: 16px; }
        .speaker-btn { background: #607d8b; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; }
        .word-en { font-size: 1.6rem; font-weight: bold; text-align: center; }
        .word-cn { font-size: 1.5rem; color: #666; margin-bottom: 10px; }
        .ipa { color: #888; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="controls-top">
    <select id="dateFilter" onchange="initGame()" style="padding:8px; border-radius:5px; font-size: 16px;">
        <option value="all">混合模式</option>
        <option value="05/25">05/25</option>
        <option value="05/26">05/26</option>
        <option value="05/27">05/27</option>
        <option value="05/28">05/28</option>
        <option value="05/29">05/29</option>
        <option value="05/30">05/30</option>
        <option value="05/31">05/31</option>
        <option value="06/01">06/01</option>
        <option value="06/02">06/02</option>
        <option value="06/03">06/03</option>
    </select>
</div>

<div class="card-container" onclick="handleCardClick()">
    <div class="card" id="card">
        <div class="face front"><h1 id="en" class="word-en">点击开始</h1></div>
        <div class="face back">
            <div id="cn" class="word-cn"></div>
            <div id="ipa" class="ipa"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button onclick="mark('fuzzy')" style="background:#e67e22">模糊</button>
    <button class="speaker-btn" onclick="playAudio()">🔊</button>
    <button onclick="mark('known')" style="background:#50c878">认识</button>
</div>

<script>
    const wordList = [
        {date:"05/25", word:"advantage", cn:"优势", ipa:"/ədˈvæntɪdʒ/"},{date:"05/25", word:"abandon", cn:"抛弃", ipa:"/əˈbændən/"},{date:"05/25", word:"achieve", cn:"实现", ipa:"/əˈtʃiv/"},{date:"05/25", word:"benefit", cn:"益处", ipa:"/ˈbɛnəfɪt/"},{date:"05/25", word:"challenge", cn:"挑战", ipa:"/ˈtʃæləndʒ/"},{date:"05/25", word:"confident", cn:"自信", ipa:"/ˈkɑnfɪdənt/"},{date:"05/25", word:"determine", cn:"衡量", ipa:"/dɪˈtɜrmɪn/"},{date:"05/25", word:"efficient", cn:"高效", ipa:"/ɪˈfɪʃənt/"},{date:"05/25", word:"frequent", cn:"频繁", ipa:"/ˈfrikwənt/"},{date:"05/25", word:"volunteer", cn:"志愿者", ipa:"/ˌvɑlənˈtɪr/"},
        {date:"05/26", word:"admit", cn:"承认", ipa:"/ədˈmɪt/"},{date:"05/26", word:"afford", cn:"买得起", ipa:"/əˈfɔrd/"},{date:"05/26", word:"agreement", cn:"协议", ipa:"/əˈɡrimənt/"},{date:"05/26", word:"alarm", cn:"警报，闹钟", ipa:"/əˈlɑrm/"},{date:"05/26", word:"allow", cn:"允许", ipa:"/əˈlaʊ/"},{date:"05/26", word:"amaze", cn:"被惊到", ipa:"/əˈmeɪz/"},{date:"05/26", word:"ancient", cn:"古代的", ipa:"/ˈeɪnʃənt/"},{date:"05/26", word:"announce", cn:"宣布", ipa:"/əˈnaʊns/"},{date:"05/26", word:"anxious", cn:"焦虑", ipa:"/ˈæŋkʃəs/"},{date:"05/26", word:"apologize", cn:"道歉", ipa:"/əˈpɑləˌdʒaɪz/"},
        {date:"05/27", word:"sunshine", cn:"阳光", ipa:"/ˈsʌnˌʃaɪn/"},{date:"05/27", word:"breeze", cn:"微风", ipa:"/briz/"},{date:"05/27", word:"dream", cn:"梦想", ipa:"/drim/"},{date:"05/27", word:"gentle", cn:"温柔的", ipa:"/ˈdʒɛntəl/"},{date:"05/27", word:"journey", cn:"旅途", ipa:"/ˈdʒɜrni/"},{date:"05/27", word:"smile", cn:"微笑", ipa:"/smaɪl/"},{date:"05/27", word:"courage", cn:"勇气", ipa:"/ˈkɜrɪdʒ/"},{date:"05/27", word:"flower", cn:"花朵", ipa:"/ˈflaʊər/"},{date:"05/27", word:"peace", cn:"平静，和平", ipa:"/pis/"},{date:"05/27", word:"cherish", cn:"珍惜", ipa:"/ˈtʃɛrɪʃ/"},
        {date:"05/28", word:"challenge", cn:"挑战", ipa:"/ˈtʃæləndʒ/"},{date:"05/28", word:"conclude", cn:"推断", ipa:"/kənˈklud/"},{date:"05/28", word:"decorate", cn:"装饰，布置", ipa:"/ˈdɛkəˌreɪt/"},{date:"05/28", word:"economy", cn:"经济", ipa:"/ɪˈkɑnəmi/"},{date:"05/28", word:"flexible", cn:"灵活的", ipa:"/ˈflɛksəbəl/"},{date:"05/28", word:"guarantee", cn:"保证，担保", ipa:"/ˌɡærənˈti/"},{date:"05/28", word:"hesitate", cn:"犹豫", ipa:"/ˈhɛzɪˌteɪt/"},{date:"05/28", word:"inspire", cn:"激励", ipa:"/ɪnˈspaɪər/"},{date:"05/28", word:"mysterious", cn:"神秘的", ipa:"/mɪˈstɪriəs/"},{date:"05/28", word:"regulate", cn:"调节", ipa:"/ˈrɛɡjəˌreɪt/"},
        {date:"05/29", word:"bargain", cn:"讲价", ipa:"/ˈbɑrɡɪn/"},{date:"05/29", word:"campaign", cn:"竞选", ipa:"/kæmˈpeɪn/"},{date:"05/29", word:"declare", cn:"声明", ipa:"/dɪˈklɛr/"},{date:"05/29", word:"explore", cn:"探索", ipa:"/ɪkˈsplɔr/"},{date:"05/29", word:"frequent", cn:"频繁的", ipa:"/ˈfrikwənt/"},{date:"05/29", word:"color", cn:"颜色", ipa:"/ˈkʌlər/"},{date:"05/29", word:"immigrant", cn:"移民", ipa:"/ˈɪmɪɡrənt/"},{date:"05/29", word:"luggage", cn:"行李", ipa:"/ˈlʌɡɪdʒ/"},{date:"05/29", word:"mystery", cn:"神秘", ipa:"/ˈmɪstəri/"},{date:"05/29", word:"occupy", cn:"占据", ipa:"/ˈɑkjəˌpaɪ/"},
        {date:"05/30", word:"accelerate", cn:"加速", ipa:"/ækˈsɛləˌreɪt/"},{date:"05/30", word:"apparent", cn:"明显", ipa:"/əˈpɛrənt/"},{date:"05/30", word:"brilliant", cn:"杰出", ipa:"/ˈbrɪljənt/"},{date:"05/30", word:"desperate", cn:"绝望的", ipa:"/ˈdɛspərɪt/"},{date:"05/30", word:"distinguish", cn:"区别", ipa:"/dɪˈstɪŋɡwɪʃ/"},{date:"05/30", word:"private", cn:"私人", ipa:"/ˈpraɪvɪt/"},{date:"05/30", word:"resist", cn:"抵抗", ipa:"/rɪˈzɪst/"},{date:"05/30", word:"restroom", cn:"洗手间", ipa:"/ˈrɛstruːm/"},{date:"05/30", word:"honor", cn:"荣耀", ipa:"/ˈɑnər/"},{date:"05/30", word:"goal", cn:"目标", ipa:"/ɡoʊl/"},
        {date:"05/31", word:"Every effort pays off.", cn:"努力终有回报。", ipa:"/ˈɛvri ˈɛfərt peɪz ɔf/"},
        {date:"05/31", word:"Stay focused and keep going.", cn:"专注前行，永不言弃。", ipa:"/steɪ ˈfoʊkəst ænd kip ˈɡoʊɪŋ/"},
        {date:"05/31", word:"Dream big and work hard.", cn:"心怀梦想，脚踏实地。", ipa:"/drim bɪɡ ænd wɜrk hɑrd/"},
        {date:"05/31", word:"Believe in yourself.", cn:"相信你自己。", ipa:"/bɪˈliv ɪn jʊərˈsɛlf/"},
        {date:"05/31", word:"Nothing is impossible.", cn:"一切皆有可能。", ipa:"/ˈnʌθɪŋ ɪz ɪmˈpɑsəbəl/"},
        {date:"06/01", word:"Where there is a will, there is a way.", cn:"有志者事竟成。", ipa:"/wɛr ðɛr ɪz ə wɪl, ðɛr ɪz ə weɪ/"},
        {date:"06/01", word:"Practice makes perfect.", cn:"熟能生巧。", ipa:"/ˈpræktɪs meɪks ˈpɜrfɪkt/"},
        {date:"06/01", word:"Never give up when facing difficulties.", cn:"面对困难永不言弃。", ipa:"/ˈnɛvər ɡɪv ʌp wɛn ˈfeɪsɪŋ ˈdɪfɪkəltiz/"},
        {date:"06/01", word:"A good habit leads to great progress.", cn:"好习惯造就大进步。", ipa:"/ə ɡʊd ˈhæbɪt lidz tu ɡreɪt ˈprɑɡrəs/"},
        {date:"06/01", word:"Knowledge changes one's fate.", cn:"知识改变命运。", ipa:"/ˈnɑlɪdʒ ˈtʃeɪndʒəz wʌnz feɪt/"},
        {date:"06/02", word:"Life is full of small surprises.", cn:"生活处处有小惊喜。", ipa:"/laɪf ɪz fʊl əv smɔl sərˈpraɪzəz/"},
        {date:"06/02", word:"Friends make our life much happier.", cn:"朋友让我们的生活更加快乐。", ipa:"/frɛndz meɪk ˈaʊər laɪf mʌtʃ ˈhæpiər/"},
        {date:"06/02", word:"We can learn a lot from daily experiences.", cn:"我们能从日常经历中学到很多。", ipa:"/wi kæn lɜrn ə lɑt frʌm ˈdeɪli ɪkˈspɪriənsəz/"},
        {date:"06/02", word:"Never give up when you meet troubles.", cn:"遇到困难时不要放弃。", ipa:"/ˈnɛvər ɡɪv ʌp wɛn ju mit ˈtrʌbəlz/"},
        {date:"06/02", word:"Doing sports keeps us healthy and strong.", cn:"运动让我们健康又强壮。", ipa:"/ˈduɪŋ spɔrts kips ʌs ˈhɛlθi ænd strɔŋ/"},
        {date:"06/03", word:"It is important that we form a good learning habit.", cn:"养成良好的学习习惯对我们很重要。", ipa:"/ɪt ɪz ɪmˈpɔrtənt ðæt wi fɔrm ə ɡʊd ˈlɜrnɪŋ ˈhæbɪt/"},
        {date:"06/03", word:"Only in this way can we make greater progress in English.", cn:"只有这样我们才能在英语上取得更大进步。", ipa:"/ˈoʊnli ɪn ðɪs weɪ kæn wi meɪk ˈɡreɪtər ˈprɑɡrəs ɪn ˈɪŋɡlɪʃ/"},
        {date:"06/03", word:"What matters most is sticking to daily reading.", cn:"最重要的是坚持每日阅读。", ipa:"/wʌt ˈmætərz moʊst ɪz ˈstɪkɪŋ tu ˈdeɪli ˈridɪŋ/"},
        {date:"06/03", word:"There is no doubt that exercise benefits our physical health.", cn:"毫无疑问运动有益于身体健康。", ipa:"/ðɛr ɪz noʊ daʊt ðæt ˈɛksərˌsaɪz ˈbɛnəfɪts ˈaʊər ˈfɪzɪkəl hɛlθ/"},
        {date:"06/03", word:"Whenever I meet difficulties, my parents always encourage me.", cn:"每当我遇到困难，父母总会鼓励我。", ipa:"/wɛnˈɛvər aɪ mit ˈdɪfɪkəltiz, maɪ ˈpɛrənts ˈɔlˌweɪz ɪnˈkɜrɪdʒ mi/"}
    ];

    let currentQueue = [];
    let fuzzyQueue = [];

    function playAudio() {
        if(currentQueue.length > 0) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQueue[0].word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    }

    function initGame() {
        const filter = document.getElementById('dateFilter').value;
        currentQueue = filter === 'all' ? [...wordList] : wordList.filter(w => w.date === filter);
        fuzzyQueue = [];
        showCard();
    }

    function showCard() {
        if (currentQueue.length === 0) {
            if (fuzzyQueue.length > 0) {
                currentQueue = [...fuzzyQueue];
                fuzzyQueue = [];
                showCard();
            } else {
                alert("太棒了！今日份刷单词已全部掌握。");
                initGame();
            }
            return;
        }
        const w = currentQueue[0];
        document.getElementById('en').innerText = w.word;
        document.getElementById('cn').innerText = w.cn;
        document.getElementById('ipa').innerText = w.ipa;
    }

    function handleCardClick() {
        document.getElementById('card').classList.toggle('flipped');
        playAudio(); 
    }

    function mark(type) {
        const word = currentQueue.shift();
        if (type === 'fuzzy') fuzzyQueue.push(word);
        document.getElementById('card').classList.remove('flipped');
        setTimeout(showCard, 300);
    }
    
    initGame();
</script>
</body>
</html>
