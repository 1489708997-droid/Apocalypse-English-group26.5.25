<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日打卡系统-音标修复版</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card-container { width: 320px; height: 220px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; text-align: center; }
        .back { transform: rotateY(180deg); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-direction: column; align-items: center;}
        .btns { display: flex; gap: 10px; }
        button { padding: 8px 16px; border: none; border-radius: 20px; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="refreshAll()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="updateContent()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card-container" onclick="document.getElementById('card').classList.toggle('flipped')">
    <div class="card" id="card">
        <div class="face front">
            <div id="counter" style="font-size:0.8rem; color:#aaa; margin-bottom:5px;"></div>
            <h2 id="en-front" style="font-size:1.2rem;">点击开始</h2>
            <div id="cn-front" style="color:#666; margin-top:10px;"></div>
        </div>
        <div class="face back">
            <div id="ipa-back" style="color:#e67e22; font-size:0.9rem; margin-bottom:10px;"></div>
            <div id="cn-back" style="font-size:1.1rem; font-weight:bold;"></div>
        </div>
    </div>
</div>

<div class="btn-group">
    <div class="btns">
        <button onclick="playAudio(event)">🔊 发音</button>
        <button onclick="nextWord(event)">下一条</button>
    </div>
</div>

    let currentList = []; let idx = 0;
    function refreshAll() { const mode = document.getElementById('modeFilter').value; const sel = document.getElementById('dateFilter'); const oldDate = sel.value; sel.innerHTML = '<option value="all">-- 请选择日期 --</option>'; const dates = [...new Set(wordList.filter(i => mode === 'all' || i.type === mode).map(i => i.date))].sort(); dates.forEach(d => { let o = document.createElement('option'); o.value=d; o.innerText=d; sel.appendChild(o); }); if(dates.includes(oldDate)) sel.value = oldDate; updateContent(); }
    function updateContent() { const mode = document.getElementById('modeFilter').value; const date = document.getElementById('dateFilter').value; currentList = wordList.filter(i => (mode === 'all' || i.type === mode) && (date === 'all' || i.date === date)); idx = 0; document.getElementById('msg').innerText = ""; render(); }

    function nextWord(e) { e.stopPropagation(); if(currentList.length > 0) { idx = (idx + 1) % currentList.length; render(); } }
    function playAudio(e) { e.stopPropagation(); if(currentList.length > 0) { const u = new SpeechSynthesisUtterance(currentList[idx].word); u.lang='en-US'; window.speechSynthesis.speak(u); } }
