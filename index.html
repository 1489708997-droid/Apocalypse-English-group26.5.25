<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日打卡系统-最终完整修复版</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { width: 320px; height: 220px; background: white; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        #status { margin-top: 10px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="refreshAll()">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="initGame()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card" id="card" onclick="nextWord()">
    <div id="en" style="font-weight:bold; font-size:1.2rem;">点击开始</div>
    <div id="cn" style="color:#666; margin-top:10px;"></div>
</div>
<div id="status">点击卡片切换下一条</div>

<script>
    // 完整数据列表 (已核对并补全)
    const wordList = [
        // 5月数据
        {date:"05/25", type:'word', word:"advantage", cn:"优势"}, {date:"05/25", type:'word', word:"abandon", cn:"抛弃"}, {date:"05/26", type:'word', word:"admit", cn:"承认"}, {date:"05/27", type:'word', word:"sunshine", cn:"阳光"}, {date:"05/28", type:'word', word:"challenge", cn:"挑战"}, {date:"05/29", type:'word', word:"bargain", cn:"讲价"}, {date:"05/30", type:'word', word:"accelerate", cn:"加速"}, {date:"05/31", type:'sentence', word:"Every effort pays off.", cn:"努力终有回报。"},
        // 6月数据
        {date:"06/01", type:'sentence', word:"Practice makes perfect.", cn:"熟能生巧。"}, {date:"06/02", type:'sentence', word:"Life is full of small surprises.", cn:"生活充满惊喜。"}, {date:"06/03", type:'sentence', word:"What matters most is sticking to reading.", cn:"最重要的是坚持阅读。"}, {date:"06/04", type:'sentence', word:"I'm running a little late.", cn:"我稍微晚点到。"}, {date:"06/05", type:'sentence', word:"Good manners leave a deep impression.", cn:"良好的修养给人深刻印象。"}, {date:"06/06", type:'sentence', word:"Self-discipline lays the foundation.", cn:"自律打下根基。"}, {date:"06/07", type:'word', word:"plenty", cn:"大量"}, {date:"06/08", type:'sentence', word:"Teamwork is important.", cn:"团队协作很重要。"}, {date:"06/09", type:'sentence', word:"Knowledge is power.", cn:"知识就是力量。"}, {date:"06/10", type:'sentence', word:"Only by striving can we embrace a future.", cn:"唯有奋斗方能拥抱未来。"}, {date:"06/11", type:'sentence', word:"It’s up to you.", cn:"由你决定。"}, {date:"06/12", type:'sentence', word:"I’m considering a gap year.", cn:"我在考虑休学一年。"}, {date:"06/13", type:'word', word:"persistent", cn:"坚持不懈的"}, {date:"06/14", type:'word', word:"dilemma", cn:"两难选择"}, {date:"06/15", type:'sentence', word:"He chose to restrain his impulse.", cn:"他选择克制自身冲动。"}, {date:"06/16", type:'word', word:"sophisticated", cn:"复杂精密的"}, {date:"06/17", type:'sentence', word:"Cherish every ordinary day.", cn:"珍惜每一个平凡日子。"}
    ];

    let filteredData = [];
    let currentIndex = 0;

    function refreshAll() {
        const mode = document.getElementById('modeFilter').value;
        const select = document.getElementById('dateFilter');
        select.innerHTML = '<option value="all">-- 请选择日期 --</option>';
        const dates = [...new Set(wordList.filter(i => mode === 'all' || i.type === mode).map(i => i.date))].sort();
        dates.forEach(d => { let o = document.createElement('option'); o.value=d; o.innerText=d; select.appendChild(o); });
        initGame();
    }

    function initGame() {
        const mode = document.getElementById('modeFilter').value;
        const date = document.getElementById('dateFilter').value;
        filteredData = wordList.filter(i => (mode === 'all' || i.type === mode) && (date === 'all' || i.date === date));
        currentIndex = 0;
        showCurrent();
    }

    function showCurrent() {
        if(filteredData.length > 0) {
            document.getElementById('en').innerText = filteredData[currentIndex].word;
            document.getElementById('cn').innerText = filteredData[currentIndex].cn;
        } else {
            document.getElementById('en').innerText = "无内容"; document.getElementById('cn').innerText = "";
        }
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % filteredData.length;
        showCurrent();
    }

    refreshAll();
</script>
</body>
</html>
