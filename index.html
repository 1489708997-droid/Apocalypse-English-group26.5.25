<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡系统-智能联动版</title>
    <style>
        :root { --bg: #f0f4f8; --primary: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { width: 320px; height: 200px; background: white; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; transition: 0.3s; }
        .card.flipped { transform: rotateY(180deg); }
    </style>
</head>
<body>

<div class="controls">
    <select id="modeFilter" onchange="updateDateDropdown(); initGame();">
        <option value="all">01 混合模式</option>
        <option value="word">02 单词模式</option>
        <option value="sentence">03 句子模式</option>
    </select>
    <select id="dateFilter" onchange="initGame()">
        <option value="all">-- 请选择日期 --</option>
    </select>
</div>

<div class="card" id="card" onclick="this.classList.toggle('flipped')">
    <div id="content">点击开始</div>
</div>

<script>
    const wordList = [
        // 数据集保持不变，代码逻辑已优化
        {date:"05/25", type:'word', word:"advantage", cn:"优势", ipa:"/ədˈvæntɪdʒ/"},
        {date:"06/10", type:'sentence', word:"Only by striving...", cn:"唯有不懈奋斗...", ipa:"/.../"},
        // ... (此处保持你的完整数据)
    ];

    // 1. 核心改进：根据当前模式动态更新日期列表
    function updateDateDropdown() {
        const mode = document.getElementById('modeFilter').value;
        const select = document.getElementById('dateFilter');
        const currentValue = select.value; // 记住当前选中的日期
        
        select.innerHTML = '<option value="all">-- 请选择日期 --</option>';
        
        // 筛选出符合当前模式的日期
        const filteredDates = [...new Set(wordList
            .filter(item => mode === 'all' || item.type === mode)
            .map(item => item.date))].sort();

        filteredDates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.innerText = d;
            select.appendChild(opt);
        });

        // 尝试恢复之前的日期选择，如果该模式下存在该日期
        if (filteredDates.includes(currentValue)) {
            select.value = currentValue;
        }
    }

    // 2. 核心改进：根据当前模式和日期筛选内容
    function initGame() {
        const mode = document.getElementById('modeFilter').value;
        const date = document.getElementById('dateFilter').value;
        
        const filtered = wordList.filter(item => {
            const matchMode = (mode === 'all' || item.type === mode);
            const matchDate = (date === 'all' || item.date === date);
            return matchMode && matchDate;
        });

        const displayEl = document.getElementById('content');
        displayEl.innerText = filtered.length > 0 ? filtered[0].word : "该条件下暂无内容";
    }

    // 初始化
    updateDateDropdown();
    initGame();
</script>
</body>
</html>
